name: Rahasya — Generate & Upload Social Cards

on:
  # Manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      date_override:
        description: "Date to render cards for (YYYY-MM-DD). Leave blank to use latest batch."
        required: false
        default: ""

  # Run automatically after Marketing Horoscope Selector completes
  workflow_run:
    workflows:
      - "Marketing Horoscope Selector"
    types:
      - completed

jobs:
  render-cards:
    name: Render & Upload PNG Cards
    runs-on: ubuntu-latest

    # Only run if upstream workflow succeeded
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python ───────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ── Dependencies ─────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Font cache ───────────────────────────────────────────────────────
      - name: Cache fonts
        uses: actions/cache@v4
        with:
          path: fonts/
          key: rahasya-fonts-v2

      # ── Bootstrap fonts ──────────────────────────────────────────────────
      - name: Bootstrap fonts
        run: python scripts/fetch_fonts.py

      # ── Render & Upload ──────────────────────────────────────────────────
      - name: Render and upload cards
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_STORAGE_BUCKET: social-cards
          RAHASYA_DATE: ${{ github.event.inputs.date_override }}
        run: python scripts/main.py

      # ── Upload artifacts ────────────────────────────────────────────────
      - name: Upload card artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rahasya-cards-${{ github.run_id }}
          path: |
            output/cards/
            output/reports/
          retention-days: 7

      # ── Summary ──────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## Rahasya Card Render Report" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          cat output/reports/report.json >> $GITHUB_STEP_SUMMARY || echo "{}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
